services:
  api:
    build:
      context: .
      dockerfile: src/VulnerableApi/Dockerfile
    container_name: vulnerable-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
