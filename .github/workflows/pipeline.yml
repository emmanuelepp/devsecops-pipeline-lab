name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sast:
    name: SAST - Snyk Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk Code Analysis
        # TODO: pin to a commit SHA for supply chain security (e.g. snyk/actions/dotnet@<sha>)
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high --sarif-file-output=snyk-sast.sarif
        # continue-on-error: true — lab tiene vulnerabilidades intencionales; cambiar a false en producción
        continue-on-error: true
      - name: Upload SAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-sast-report
          path: snyk-sast.sarif

  sca:
    name: SCA - Snyk Open Source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Restore dependencies
        run: dotnet restore src/VulnerableApi/VulnerableApi.csproj
      - name: Install Snyk CLI
        run: npm install -g snyk
      - name: Run Snyk SCA
        working-directory: src/VulnerableApi
        run: snyk test --severity-threshold=high --no-report --json-file-output=snyk-sca.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # continue-on-error: true — lab tiene vulnerabilidades intencionales; cambiar a false en producción
        continue-on-error: true
      - name: Upload SCA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-sca-report
          path: src/VulnerableApi/snyk-sca.json

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast, sca]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t vulnerable-api:${{ github.sha }} -f src/VulnerableApi/Dockerfile .
      - name: Export Docker image
        run: docker save vulnerable-api:${{ github.sha }} -o image.tar
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  container-scan:
    name: Container Scanning - Snyk
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load Docker image
        run: docker load -i image.tar
      - name: Run Snyk Container Scan
        # TODO: pin to a commit SHA for supply chain security (e.g. snyk/actions/docker@<sha>)
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: vulnerable-api:${{ github.sha }}
          args: --severity-threshold=high
        continue-on-error: false

  iac-scan:
    name: IaC Scanning - Snyk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Snyk CLI
        run: npm install -g snyk
      - name: Run Snyk IaC Scan
        run: snyk iac test ./docker-compose.yml --severity-threshold=high --no-report
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: false

  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load Docker image
        run: docker load -i image.tar
      - name: Start API
        run: |
          docker run -d -p 8080:8080 --name vulnerable-api vulnerable-api:${{ github.sha }}
          echo "Waiting for API to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:8080/swagger/index.html; do sleep 2; done'
      - name: Run OWASP ZAP Baseline Scan
        # Corremos ZAP directo via Docker para evitar el bug de la action
        # que usa la API antigua de artifacts (v6.0-preview) y retorna 400
        run: |
          docker run --network host \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:8080 \
              -a -I \
              -r report_html.html
        continue-on-error: false
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report
          path: ${{ github.workspace }}/report_html.html
      - name: Stop API
        if: always()
        run: docker stop vulnerable-api
