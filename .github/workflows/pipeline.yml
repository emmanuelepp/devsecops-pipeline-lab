name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sast:
    name: SAST - Snyk Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk Code Analysis
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high
        continue-on-error: false

  sca:
    name: SCA - Snyk Open Source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Restore dependencies
        run: dotnet restore src/VulnerableApi/VulnerableApi.csproj
      - name: Install Snyk CLI
        run: npm install -g snyk
      - name: Run Snyk SCA
        working-directory: src/VulnerableApi
        run: snyk test --severity-threshold=high --no-report
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: false

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast, sca]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t vulnerable-api:${{ github.sha }} -f src/VulnerableApi/Dockerfile .

  container-scan:
    name: Container Scanning - Snyk
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t vulnerable-api:${{ github.sha }} -f src/VulnerableApi/Dockerfile .
      - name: Run Snyk Container Scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: vulnerable-api:${{ github.sha }}
          args: --severity-threshold=high
        continue-on-error: false

  iac-scan:
    name: IaC Scanning - Snyk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Snyk CLI
        run: npm install -g snyk
      - name: Run Snyk IaC Scan
        run: snyk iac test ./docker-compose.yml --severity-threshold=high --no-report
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: false

  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: build
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Fix permissions
        run: chmod 777 ${{ github.workspace }}
      - name: Build and start API
        run: |
          docker build -t vulnerable-api:${{ github.sha }} -f src/VulnerableApi/Dockerfile .
          docker run -d -p 8080:8080 --name vulnerable-api vulnerable-api:${{ github.sha }}
          sleep 15
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          cmd_options: '-a'
          artifact_name: 'zap-scan-report'
        continue-on-error: false
      - name: Stop API
        if: always()
        run: docker stop vulnerable-api